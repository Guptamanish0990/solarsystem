<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00d4ff;
  --accent2: #ff6b00;
  --panel-bg: rgba(3,12,26,0.96);
  --border: rgba(0,212,255,0.2);
  --text: #ddeeff;
  --panel-w: 320px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body { background:#000308; color:var(--text); font-family:'Exo 2',sans-serif; overflow:hidden; height:100vh; width:100vw; }
#starfield { position:fixed; inset:0; pointer-events:none; z-index:0; }
#solarCanvas { position:fixed; inset:0; z-index:1; touch-action:none; }

/* ── HEADER ── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,3,8,0.95) 0%,transparent 100%);
}
.header h1 {
  font-family:'Orbitron',monospace; font-size:clamp(0.7rem,2.5vw,1.1rem); font-weight:900;
  letter-spacing:4px; color:var(--accent); text-transform:uppercase;
  text-shadow:0 0 20px rgba(0,212,255,0.6);
}
.header-right { display:flex; align-items:center; gap:14px; }
.live-badge { display:flex; align-items:center; gap:6px; font-size:0.58rem; letter-spacing:2px; color:rgba(255,255,255,0.4); text-transform:uppercase; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#00ff88; box-shadow:0 0 8px #00ff88; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.hint { font-size:0.6rem; letter-spacing:2px; color:rgba(255,255,255,0.28); text-transform:uppercase; }

/* ── CONTROLS ── */
.controls {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:20; display:flex; align-items:center; gap:10px;
  background:var(--panel-bg); border:1px solid var(--border);
  border-radius:40px; padding:8px 16px; backdrop-filter:blur(16px);
  white-space:nowrap;
}
.controls label { font-family:'Orbitron',monospace; font-size:0.55rem; letter-spacing:2px; color:var(--accent); }
.controls input[type=range] {
  -webkit-appearance:none; width:80px; height:2px;
  background:linear-gradient(to right,var(--accent),var(--accent2)); border-radius:2px; outline:none;
}
.controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 8px var(--accent); cursor:pointer;
}
.btn {
  background:none; border:1px solid var(--border); color:var(--accent);
  font-family:'Orbitron',monospace; font-size:0.54rem; letter-spacing:1.5px;
  padding:5px 11px; border-radius:20px; cursor:pointer; transition:all 0.2s;
}
.btn:hover { background:rgba(0,212,255,0.1); }
.btn-icon { display:none; font-size:1rem; background:none; border:none; color:var(--accent); cursor:pointer; padding:4px; }

/* ── INFO PANEL  (desktop: right sidebar) ── */
.info-panel {
  position:fixed; right:18px; top:50%;
  transform:translateY(-50%) translateX(calc(var(--panel-w) + 40px));
  z-index:30; width:var(--panel-w); max-height:84vh;
  background:var(--panel-bg); border:1px solid var(--border); border-radius:18px;
  backdrop-filter:blur(24px);
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 0 80px rgba(0,212,255,0.06),0 20px 60px rgba(0,0,0,0.6);
  display:flex; flex-direction:column; overflow:hidden;
}
.info-panel.visible { transform:translateY(-50%) translateX(0); }

/* Panel Header */
.panel-head {
  padding:18px 18px 0; flex-shrink:0;
  background:linear-gradient(to bottom,rgba(0,20,40,0.8),transparent);
}
.close-btn {
  position:absolute; top:12px; right:12px; background:none; border:none;
  color:rgba(255,255,255,0.25); font-size:0.95rem; cursor:pointer; transition:color 0.2s; z-index:5;
}
.close-btn:hover { color:var(--accent); }
.planet-icon { width:58px; height:58px; border-radius:50%; margin:0 auto 10px; display:block; }
.planet-name {
  font-family:'Orbitron',monospace; font-size:1rem; font-weight:700;
  text-align:center; letter-spacing:3px; margin-bottom:3px;
}
.planet-type {
  text-align:center; font-size:0.58rem; letter-spacing:2.5px;
  color:rgba(255,255,255,0.35); text-transform:uppercase; margin-bottom:12px;
}

/* Tabs */
.tabs {
  display:flex; border-bottom:1px solid var(--border);
  padding:0 8px; flex-shrink:0; gap:0; overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab-btn {
  background:none; border:none; color:rgba(255,255,255,0.35);
  font-family:'Exo 2',sans-serif; font-size:0.58rem; letter-spacing:1.5px;
  text-transform:uppercase; padding:8px 8px 7px; cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; flex-shrink:0;
}
.tab-btn:hover { color:rgba(255,255,255,0.7); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Tab content */
.tab-content {
  flex:1; overflow-y:auto; padding:12px 16px 16px;
  scrollbar-width:thin; scrollbar-color:rgba(0,212,255,0.15) transparent;
}
.tab-content::-webkit-scrollbar { width:3px; }
.tab-content::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.15); border-radius:2px; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

.section-lbl {
  font-family:'Orbitron',monospace; font-size:0.5rem; letter-spacing:3px;
  color:rgba(255,255,255,0.2); text-transform:uppercase; margin:10px 0 6px;
}
.section-lbl:first-child { margin-top:0; }
.stat-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; gap:8px; }
.stat-label { font-size:0.58rem; letter-spacing:1.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; flex-shrink:0; padding-top:1px; }
.stat-value { font-family:'Orbitron',monospace; font-size:0.63rem; font-weight:600; color:var(--accent); text-align:right; }
.divider { height:1px; background:var(--border); margin:9px 0; }
.desc-text { font-size:0.72rem; line-height:1.65; color:rgba(255,255,255,0.58); }
.facts-list { list-style:none; padding:0; margin-top:4px; }
.facts-list li {
  font-size:0.7rem; line-height:1.55; color:rgba(255,255,255,0.52);
  padding:5px 0 5px 14px; position:relative;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.facts-list li:last-child { border-bottom:none; }
.facts-list li::before {
  content:''; position:absolute; left:0; top:13px;
  width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:0.4;
}

/* Surface tab */
.surface-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:10px; padding:9px 11px; margin-bottom:7px;
}
.surface-card-title { font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:2px; color:var(--accent); margin-bottom:5px; }
.surface-card p { font-size:0.7rem; line-height:1.6; color:rgba(255,255,255,0.55); }

/* Missions tab */
.mission-card {
  background:rgba(255,255,255,0.03); border-left:2px solid var(--accent2);
  border-radius:0 8px 8px 0; padding:9px 11px; margin-bottom:7px;
}
.mission-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:3px; }
.mission-name { font-family:'Orbitron',monospace; font-size:0.62rem; letter-spacing:1.5px; color:#fff; }
.mission-status { font-size:0.52rem; letter-spacing:1.5px; padding:2px 7px; border-radius:10px; text-transform:uppercase; font-weight:700; white-space:nowrap; }
.status-active   { background:rgba(0,255,100,0.15); color:#00ff88; }
.status-completed{ background:rgba(255,150,0,0.15);  color:#ffaa44; }
.status-planned  { background:rgba(0,180,255,0.15);  color:#44ccff; }
.mission-country { font-size:0.58rem; color:rgba(255,255,255,0.35); margin-bottom:4px; }
.mission-desc    { font-size:0.67rem; line-height:1.55; color:rgba(255,255,255,0.5); }

/* Satellites tab */
.country-block { margin-bottom:12px; }
.country-name {
  font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:2px;
  color:var(--accent); margin-bottom:6px; display:flex; align-items:center; gap:7px;
}
.sat-item { display:flex; gap:8px; align-items:flex-start; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.67rem; }
.sat-item:last-child { border-bottom:none; }
.sat-name { color:rgba(255,255,255,0.75); flex:1; line-height:1.4; }
.sat-year { color:rgba(255,255,255,0.28); font-size:0.58rem; white-space:nowrap; padding-top:1px; }
.no-data { font-size:0.7rem; color:rgba(255,255,255,0.3); font-style:italic; padding:8px 0; }

/* Minerals tab */
.mineral-category { margin-bottom:12px; }
.mineral-cat-title { font-family:'Orbitron',monospace; font-size:0.56rem; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:6px; }
.mineral-grid { display:flex; flex-direction:column; gap:5px; }
.mineral-item { display:flex; align-items:flex-start; gap:9px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); border-radius:8px; padding:8px 10px; }
.mineral-info { flex:1; min-width:0; }
.mineral-name { font-size:0.7rem; font-weight:600; color:rgba(255,255,255,0.85); margin-bottom:2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.rarity-badge { font-size:0.48rem; letter-spacing:1.5px; padding:1px 6px; border-radius:8px; text-transform:uppercase; font-weight:700; white-space:nowrap; }
.rarity-common   { background:rgba(100,200,100,0.15); color:#80dd80; }
.rarity-abundant { background:rgba(0,180,255,0.15);   color:#44ccff; }
.rarity-rare     { background:rgba(200,100,255,0.15); color:#cc88ff; }
.rarity-trace    { background:rgba(255,180,0,0.15);   color:#ffcc44; }
.mineral-formula { font-size:0.6rem; color:rgba(255,255,255,0.3); font-style:italic; margin-bottom:3px; }
.mineral-desc    { font-size:0.67rem; line-height:1.5; color:rgba(255,255,255,0.48); }

/* ════════════════════════════════════
   TABLET  (≤ 900px)
════════════════════════════════════ */
@media (max-width:900px) {
  :root { --panel-w: 290px; }
  .hint { display:none; }
  .header h1 { letter-spacing:2px; }
}

/* ════════════════════════════════════
   MOBILE  (≤ 600px) — bottom sheet
════════════════════════════════════ */
@media (max-width:600px) {
  :root { --panel-w: 100%; }

  .header { padding:10px 14px; }
  .header h1 { font-size:0.72rem; letter-spacing:2px; }
  .live-badge { display:none; }
  .hint { display:none; }

  /* Controls pill becomes smaller */
  .controls { bottom:12px; padding:7px 12px; gap:8px; }
  .controls label { display:none; }
  .controls input[type=range] { width:70px; }
  .btn { font-size:0.5rem; padding:4px 9px; }

  /* Panel slides up from bottom */
  .info-panel {
    right:0; left:0; bottom:0; top:auto;
    width:100%; max-height:72vh; min-height:0;
    border-radius:20px 20px 0 0;
    transform:translateY(110%) translateX(0);
    /* Override the desktop centering */
    top:auto !important;
  }
  .info-panel.visible {
    transform:translateY(0) !important;
  }

  .panel-head { padding:14px 16px 0; }
  .planet-icon { width:50px; height:50px; margin-bottom:8px; }
  .planet-name { font-size:0.88rem; letter-spacing:2px; }
  .planet-type { font-size:0.55rem; margin-bottom:10px; }

  /* Pull handle */
  .panel-head::before {
    content:''; display:block; width:36px; height:4px; border-radius:2px;
    background:rgba(255,255,255,0.15); margin:0 auto 12px;
  }

  .tab-btn { font-size:0.54rem; padding:7px 7px 6px; letter-spacing:1px; }
  .tab-content { padding:10px 14px 14px; }
  .stat-label { font-size:0.55rem; }
  .stat-value { font-size:0.6rem; }
}

/* ════════════════════════════════════
   VERY SMALL  (≤ 360px)
════════════════════════════════════ */
@media (max-width:360px) {
  .header h1 { font-size:0.62rem; }
  .info-panel { max-height:78vh; }
  .tab-btn { font-size:0.5rem; padding:6px 5px; }
}

</style>
</head>
<body>
<canvas id="starfield"></canvas>
<canvas id="solarCanvas"></canvas>

<div class="header">
  <h1>&#9881; Solar System Explorer</h1>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live Simulation</div>
    <span class="hint">Click any body</span>
  </div>
</div>

<!-- INFO PANEL -->
<div class="info-panel" id="infoPanel">
  <div class="panel-head">
    <button class="close-btn" id="closeBtn">&#x2715;</button>
    <canvas class="planet-icon" id="planetIcon" width="62" height="62"></canvas>
    <div class="planet-name" id="planetName"></div>
    <div class="planet-type" id="planetType"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="surface">Surface</button>
    <button class="tab-btn" data-tab="missions">Missions</button>
    <button class="tab-btn" data-tab="satellites">Satellites</button>
    <button class="tab-btn" data-tab="minerals">Minerals</button>
  </div>
  <div class="tab-content">
    <div class="tab-pane active" id="tab-overview"></div>
    <div class="tab-pane" id="tab-surface"></div>
    <div class="tab-pane" id="tab-missions"></div>
    <div class="tab-pane" id="tab-satellites"></div>
    <div class="tab-pane" id="tab-minerals"></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <label>Speed</label>
  <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
  <button class="btn" id="pauseBtn">Pause</button>
</div>

// ============================================================
// CANVAS + ANIMATION SETUP
// ============================================================
// Base orbit radii (designed for ~900px wide viewport)
const BASE_ORBITS = [75,105,140,175,240,300,355,405];
const PLANET_NAMES = ["Mercury","Venus","Earth","Mars","Jupiter","Saturn","Uranus","Neptune"];
const PLANET_SPEEDS= [4.15,1.62,1.0,0.53,0.084,0.034,0.012,0.006];

const PLANETS = PLANET_NAMES.map((name,i)=>({
  name, speed:PLANET_SPEEDS[i], angle:Math.random()*Math.PI*2, orbitR:BASE_ORBITS[i]
}));

const starCanvas=document.getElementById('starfield');
const starCtx=starCanvas.getContext('2d');
const canvas=document.getElementById('solarCanvas');
const ctx=canvas.getContext('2d');
let W,H,cx,cy,speedMult=1,paused=false,selectedPlanet=null;

function getScale(){
  // Scale orbits so Neptune fits with some margin
  // Base design: 900px wide, Neptune at 405px radius -> needs 810px + margins
  const minDim = Math.min(window.innerWidth, window.innerHeight);
  // On mobile we want the system to fit in a square
  const isMobile = window.innerWidth <= 600;
  const refDim = isMobile ? minDim : Math.min(window.innerWidth, window.innerHeight * 1.1);
  return Math.max(0.28, Math.min(1.0, refDim / 870));
}

function resize(){
  W=canvas.width=starCanvas.width=window.innerWidth;
  H=canvas.height=starCanvas.height=window.innerHeight;
  cx=W/2;
  // On mobile shift center up a bit so bottom sheet doesn't cover Sun
  const isMobile = window.innerWidth <= 600;
  cy = isMobile ? H * 0.40 : H/2;
  const sc = getScale();
  PLANETS.forEach((p,i)=>{ p.orbitR = BASE_ORBITS[i] * sc; });
  // Also scale planet radii
  const planetRadii = [5,8,9,6.5,20,17,13,12];
  PLANETS.forEach((p,i)=>{
    PLANET_DATA[p.name].radius = Math.max(3, planetRadii[i] * sc);
  });
  PLANET_DATA['Sun'].radius = Math.max(14, 28 * sc);
  drawStars();
}

function drawStars(){
  starCtx.clearRect(0,0,W,H);
  for(let i=0;i<350;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const r=Math.random()*1.5,a=0.15+Math.random()*0.85;
    const hue=Math.random()<0.12?(Math.random()<0.5?200:30):0;
    starCtx.beginPath(); starCtx.arc(x,y,r,0,Math.PI*2);
    starCtx.fillStyle=hue===0?`rgba(255,255,255,${a})`:`hsla(${hue},80%,90%,${a})`;
    starCtx.fill();
  }
}

function expandHex(h){return h.length===4?'#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]:h;}
function hexRgb(hex){const h=expandHex(hex||'#888888');return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lighten(hex,a){const[r,g,b]=hexRgb(hex);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function darken(hex,a){const[r,g,b]=hexRgb(hex);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}
function safeRG(ctx,x1,y1,r1,x2,y2,r2){
  if([x1,y1,r1,x2,y2,r2].some(v=>!isFinite(v)||isNaN(v))){
    const fb=ctx.createRadialGradient(0,0,1,0,0,10);fb.addColorStop(0,'transparent');fb.addColorStop(1,'transparent');return fb;
  }
  return ctx.createRadialGradient(x1,y1,Math.max(0,r1),x2,y2,Math.max(0.01,r2));
}
function drawOrbit(r,hi){
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=hi?'rgba(0,212,255,0.35)':'rgba(255,255,255,0.055)';
  ctx.lineWidth=hi?1.5:0.6;ctx.stroke();
}

function drawSun(){
  const d=PLANET_DATA['Sun'];
  const r=d.radius||28;
  for(let i=5;i>=1;i--){
    const g=safeRG(ctx,cx,cy,r*.5,cx,cy,r*(1+i*.5));
    g.addColorStop(0,`rgba(255,120,0,${.04*i})`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,r*(1+i*.5),0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
  const sg=safeRG(ctx,cx-r*.3,cy-r*.3,2,cx,cy,r);
  sg.addColorStop(0,'#fff8b0');sg.addColorStop(.4,'#ffe040');sg.addColorStop(.8,d.color);sg.addColorStop(1,'#cc4400');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
}

function drawPlanet(p,data,x,y,hi){
  const r=data.radius;
  if(hi){
    ctx.beginPath();ctx.arc(x,y,r+7,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,212,255,0.65)';ctx.lineWidth=1.5;ctx.stroke();
  }
  if(data.hasRings){
    ctx.save();ctx.translate(x,y);ctx.scale(1,.3);
    for(let ri=0;ri<4;ri++){
      ctx.beginPath();ctx.arc(0,0,r+6+ri*5,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,180,120,${[.5,.35,.2,.1][ri]})`;ctx.lineWidth=3;ctx.stroke();
    }
    ctx.restore();
  }
  const[gr,gg,gb]=hexRgb(data.glow);
  const glowG=safeRG(ctx,x,y,r*.5,x,y,r*2.2);
  glowG.addColorStop(0,`rgba(${gr},${gg},${gb},.3)`);glowG.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(x,y,r*2.2,0,Math.PI*2);ctx.fillStyle=glowG;ctx.fill();

  const pg=safeRG(ctx,x-r*.3,y-r*.35,r*.1,x,y,r);
  pg.addColorStop(0,lighten(data.color,45));pg.addColorStop(.5,data.color);pg.addColorStop(1,darken(data.color,45));
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();

  if(data.hasStripes){
    ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
    [[.25,'rgba(180,110,50,.4)'],[.45,'rgba(100,55,15,.25)'],[.65,'rgba(190,150,70,.3)'],[.82,'rgba(140,80,30,.2)']].forEach(([pos,col])=>{
      ctx.fillStyle=col;ctx.fillRect(x-r,y-r+r*2*pos-2.5,r*2,5);
    });
    ctx.restore();
  }
  if(p.name==='Earth'){
    ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
    ctx.fillStyle='rgba(50,140,50,.55)';
    ctx.beginPath();ctx.ellipse(x-2,y-2,r*.4,r*.6,.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+3,y+2,r*.35,r*.4,-.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  const sh=safeRG(ctx,x-r*.4,y-r*.4,0,x-r*.2,y-r*.2,r*.7);
  sh.addColorStop(0,'rgba(255,255,255,.2)');sh.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=sh;ctx.fill();

  ctx.font=`500 9.5px 'Exo 2',sans-serif`;
  ctx.fillStyle=hi?'rgba(0,212,255,.95)':'rgba(255,255,255,.42)';
  ctx.textAlign='center';ctx.fillText(p.name,x,y+r+13);
}

function drawPlanetIcon(data){
  const ic=document.getElementById('planetIcon');
  const ic2=ic.getContext('2d');
  ic2.clearRect(0,0,62,62);
  const cx2=31,cy2=31,r=23;
  if(data.hasRings){
    ic2.save();ic2.translate(cx2,cy2);ic2.scale(1,.3);
    for(let ri=0;ri<3;ri++){
      ic2.beginPath();ic2.arc(0,0,r+5+ri*5,0,Math.PI*2);
      ic2.strokeStyle=`rgba(200,180,120,${.5-ri*.12})`;ic2.lineWidth=3;ic2.stroke();
    }
    ic2.restore();
  }
  const g=ic2.createRadialGradient(cx2-8,cy2-8,2,cx2,cy2,r);
  g.addColorStop(0,lighten(data.color,45));g.addColorStop(.5,data.color);g.addColorStop(1,darken(data.color,45));
  ic2.beginPath();ic2.arc(cx2,cy2,r,0,Math.PI*2);ic2.fillStyle=g;ic2.fill();
  const[gr,gg,gb]=hexRgb(data.glow);
  ic.style.boxShadow=`0 0 22px rgba(${gr},${gg},${gb},.6)`;
}

function renderSatellites(d){
  const el=document.getElementById('tab-satellites');

  el.innerHTML=keys.map(country=>`
    <div class="country-block">
      <div class="country-name">${country}</div>

        <div class="sat-item">

          <span class="sat-year">${s.year}</span>

function sr(label,value){
  return`<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-value">${value}</span></div>`;
}

function showInfo(name){
  const d=PLANET_DATA[name]; if(!d)return;
  d._name=name;
  document.getElementById('planetName').textContent=name.toUpperCase();
  document.getElementById('planetName').style.color=d.color;
  document.getElementById('planetType').textContent=d.type;
  drawPlanetIcon(d);
  renderOverview(d); renderSurface(d); renderMissions(d); renderSatellites(d); renderMinerals(d);
  switchTab('overview');
  const panel=document.getElementById('infoPanel');
  document.querySelector('.tab-content').scrollTop=0;
  panel.classList.add('visible');
}

function hideInfo(){
  document.getElementById('infoPanel').classList.remove('visible');
  selectedPlanet=null;
}

function switchTab(tabName){
  currentTab=tabName;
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('active',b.dataset.tab===tabName);});
  document.querySelectorAll('.tab-pane').forEach(p=>{p.classList.toggle('active',p.id==='tab-'+tabName);});
  document.querySelector('.tab-content').scrollTop=0;
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

// INTERACTION
// ============================================================
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(Math.hypot(mx-cx,my-cy)<PLANET_DATA['Sun'].radius+8){selectedPlanet='Sun';showInfo('Sun');return;}
  for(const p of PLANETS){
    const px=cx+Math.cos(p.angle)*p.orbitR,py=cy+Math.sin(p.angle)*p.orbitR;
    if(Math.hypot(mx-px,my-py)<PLANET_DATA[p.name].radius+10){selectedPlanet=p.name;showInfo(p.name);return;}
  }
  hideInfo();
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let hit=Math.hypot(mx-cx,my-cy)<PLANET_DATA['Sun'].radius+8;
  if(!hit)for(const p of PLANETS){
    const px=cx+Math.cos(p.angle)*p.orbitR,py=cy+Math.sin(p.angle)*p.orbitR;
    if(Math.hypot(mx-px,my-py)<PLANET_DATA[p.name].radius+10){hit=true;break;}
  }
  canvas.style.cursor=hit?'pointer':'default';
});

document.getElementById('closeBtn').addEventListener('click',hideInfo);
document.getElementById('speedSlider').addEventListener('input',e=>speedMult=parseFloat(e.target.value));
document.getElementById('pauseBtn').addEventListener('click',()=>{
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause';
});

// ============================================================
// ANIMATION LOOP
// ============================================================
let last=0;
function animate(ts){
  const dt=Math.min((ts-last)/16.67,3);last=ts;
  ctx.clearRect(0,0,W,H);
  if(!paused)for(const p of PLANETS)p.angle+=p.speed*.012*speedMult*dt;
  for(const p of PLANETS)drawOrbit(p.orbitR,selectedPlanet===p.name);
  drawSun();
  for(const p of PLANETS){
    const px=cx+Math.cos(p.angle)*p.orbitR,py=cy+Math.sin(p.angle)*p.orbitR;
    drawPlanet(p,PLANET_DATA[p.name],px,py,selectedPlanet===p.name);
  }
  requestAnimationFrame(animate);
}

// ── TOUCH / SWIPE to close panel on mobile ──────────────────────────────────
(function(){
  const panel = document.getElementById('infoPanel');
  let startY = 0, isDragging = false;
  panel.addEventListener('touchstart', e=>{
    const tc = panel.querySelector('.tab-content');
    // Only initiate swipe-close when at the very top of scroll
    if(tc && tc.scrollTop > 4) return;
    startY = e.touches[0].clientY; isDragging = true;
  }, {passive:true});
  panel.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0) panel.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  panel.addEventListener('touchend', e=>{
    if(!isDragging){ return; } isDragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    panel.style.transform = '';
    if(dy > 80) hideInfo();
  });
})();

// ── Canvas tap (mobile): increase hit radius for small planets ───────────────
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left, my = t.clientY - rect.top;
  // Simulate click
  const ev = new MouseEvent('click',{clientX:t.clientX, clientY:t.clientY});
  canvas.dispatchEvent(ev);
},{passive:false});

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(animate);
</script>
